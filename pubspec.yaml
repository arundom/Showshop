name: showshop
description: A Flutter app for resale of used items.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0

  # State management
  provider: ^6.1.1

  # Date formatting
  intl: ^0.19.0

  # Network connectivity detection
  connectivity_plus: ^5.0.2

  # Icons
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_Icon.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/app_Icon.png
  windows:
    generate: true
    image_path: assets/app_Icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/app_Icon.png
