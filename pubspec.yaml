name: showshop
description: A Flutter app for resale of used items.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database
  sqflite: ^2.3.0
  path: ^1.8.3

  # State management
  provider: ^6.1.1

  # Date formatting
  intl: ^0.19.0

  # Network connectivity detection
  connectivity_plus: ^5.0.2

  # Icons
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
